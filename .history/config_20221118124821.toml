baseURL = "https://ahead-of-north.github.io"
languageCode = "en-us"
title = "dHb的笔记沙滩
theme = "noteworthy"
enableRobotsTXT = true
paginate = 4 # Set the number of posts to show before overflowing to the next page.
summaryLength = 10 # Configure how long the post summary should be on the homepage.

# Add your Google Analytics identifier: UA-XXXXXXXX-X
googleAnalytics = ""

# Add your Disqus shortname here.
disqusShortname = ""

[taxonomies]
  tag = "tags"

[author]
    name = "dHb"

# Set to false to disallow raw HTML in markdown files
[markup.goldmark.renderer]
    unsafe = true

[params]
    math = true
    # Blog description at the top of the homepage. Supports markdown.
    description = ""

    showReadMore = false

    # Set enableKofi to true to enable the Ko-fi support button. Add your Ko-fi ID to link to your account.
    enableKofi = false
    kofi = ""

    # Add links to your accounts. Remove the ones you don't want to include.
    # Main
    email = "houbei123@outlook.com"


    # Writing
    medium = "#"
    blogger = "#"
    wordpress = "#"

    # Creative & Visual
    dribbble = "#"
    behance = "#"
    deviantart = "#"
    flickr = "#"

    # Audio & Music
    soundcloud = "#"

    # Programming
    github = "#"
    stackoverflow = "#"
    gitlab = "#"
    codepen = "#"

    # Academic
    googlescholar = "#"
    impactstory = "#"
    orcid = "#"

    # Travel
    googlemaps = "#"
    tripadvisor = "#"

# Menu links along the sidebar navigation.

[[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 1

[[menu.main]]
    name = "Archives"
    identifier = "archives"
    url = "/archives/"
    weight = 2

# Privacy configurations: https://gohugo.io/about/hugo-and-gdpr/
[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = false
    useSessionStorage = false
  [privacy.instagram]
    disable = false
    simple = false
  [privacy.twitter]
    disable = false
    enableDNT = false
    simple = false
  [privacy.vimeo]
    disable = false
    simple = false
  [privacy.youtube]
    disable = false
    privacyEnhanced = true
